<div class="my-5">
    <h1 class="text-center mb-4">{{title}}</h1>


    <div class="mb-2 nounderline" id="insert" style="float:right;">
        <a href="/bbs/insert" style="color: gold;">글쓰기</a>
    </div>

    <div id="div_list"></div>

  

    {%raw%}
    <script id="temp_list" type="x-handlebars-template">
        <table class="table  table-hover table-bordered">
            {{#each .}}
            <tr >
                <td>{{bid}}</td>
                <td><a href="/bbs/{{bid}}">{{title}}</a></td>
                <td>{{writer}}</td>
                <td>{{fmtdate}}</td>
            </tr>
            {{/each}}
        </table>   
    </script>
    {%endraw%}
</div>
<script>
    getList();
    function getList(){
        $.ajax({
        type:"get",
        url:"/bbs/list.json",
        success:function(data){
            //console.log(data);
            const temp=Handlebars.compile($("#temp_list").html());
            $("#div_list").html(temp(data));
        }
     });
    }
   

   if(uid){
    $("#insert").show();
   }else{
    $("#insert").hide();
   }
</script>
